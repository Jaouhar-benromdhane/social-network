version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: social-network-backend
    environment:
      APP_PORT: "8080"
      DB_PATH: /app/data/social_network.db
      MIGRATIONS_PATH: file:///app/pkg/db/migrations/sqlite
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8080:8080"
    networks:
      - social-network-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: social-network-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - social-network-net

networks:
  social-network-net:
    driver: bridge
